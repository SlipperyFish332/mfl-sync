name: MFL Career Stats Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"

jobs:
  sync-career-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CAREER_BATCH_SIZE: 25
      CAREER_CONCURRENCY: 1
      REQUEST_DELAY_MS: 500
      MAX_BATCHES_PER_RUN: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run MFL career stats sync
        run: node sync-mfl-career-stats.js
